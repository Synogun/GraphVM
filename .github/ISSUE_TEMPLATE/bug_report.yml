name: Bug report
about: Create a bug report to help us improve
title: "[BUG] <title>"
labels: bug
assignees: Synogun
body:
- type: markdown
  attributes:
    value: "Thanks for taking time to fill our form! Please answer the sections below to help us better understand the issue you are encountering."
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search to see if an issue already exists for the bug you encountered.
    options:
    - label: I have searched the existing issues
      required: true
- type: textarea
  attributes:
    label: Current Behavior
    description: A concise description of what you're experiencing.
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: A concise description of what you expected to happen.
  validations:
    required: false
- type: textarea
  attributes:
    label: Steps To Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1. In this environment...
      1. With this config...
      1. Run '...'
      1. See error...
  validations:
    required: false
- type: dropdown
  attributes:
    label: Browser
    description: Which browsers are you experiencing the issue on?
    multiple: true
    options:
      - Chrome
      - Firefox
      - Edge
      - Safari
      - Other (Specify in 'Anything else?' section)
    default: []
  validations:
    required: false
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the issue you are encountering!

      Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false