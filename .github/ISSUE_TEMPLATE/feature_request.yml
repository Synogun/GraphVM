name: Feature request
about: Suggest an idea for this project
title: '[FEATURE] <title>'
labels: enhancement
assignees: Synogun
body:
- type: markdown
  attributes:
    value: "Thanks for taking time to fill our form! Please fill out the sections below to help us better understand the feature you are suggesting."
- type: checkboxes
  attributes:
    label: Is there an existing request for this?
    description: Please search to see if a request already exists for the feature you encountered.
    options:
    - label: I have searched the existing requests
      required: true
- type: textarea
  attributes:
    label: Describe the feature
    description: A clear and concise description of what the feature is.
  validations:
    required: true
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the feature you are suggesting!
 
      Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false